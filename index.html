<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>George C Photography</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0f0f0f; color: #fff; }
        nav { padding: 2rem; text-align: center; border-bottom: 1px solid #333; }
        .gallery { 
            display: columns; column-width: 300px; column-gap: 15px; 
            padding: 20px; max-width: 1200px; margin: auto; 
        }
        .gallery img { 
            width: 100%; margin-bottom: 15px; border-radius: 4px; 
            filter: grayscale(20%); transition: 0.4s; 
        }
        .gallery img:hover { filter: grayscale(0%); transform: translateY(-5px); }
        footer { text-align: center; padding: 4rem; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <h1>George C Photography</h1>
    </nav>

    <div class="gallery">
        <img src="images/img1.jpg">
        <img src="images/img2.jpg">
        <img src="images/img3.jpg">
        <img src="images/img4.jpg">
    </div>

    <footer>
        &copy; 2026 George C Photography | Hosted on GitHub Pages
    </footer>
</body>
</html>
